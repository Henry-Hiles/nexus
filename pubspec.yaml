name: nexus
description: "Yet another Matrix client"
version: 0.1.0
publish_to: none

flutter:
  assets:
    - assets/
  uses-material-design: true

environment:
  sdk: "^3.11.5"

dependency_overrides:
  linkify:
    git:
      url: https://github.com/appelladev/linkify
      ref: fix/consecutive-periods-loose-url

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 3.3.1
  hooks_riverpod: 3.3.1
  intl: 0.20.2
  fast_immutable_collections: 11.2.0
  path_provider: 2.1.5
  path_provider_android: 2.2.23
  url_launcher: 6.3.2
  freezed_annotation: 3.1.0
  image_picker: 1.2.2
  file_picker: 11.0.2
  path: 1.9.1
  dynamic_color: 1.8.1
  collection: 1.19.1
  window_manager: 0.5.1
  color_hash: 1.0.1
  flutter_widget_from_html_core: 0.17.2
  flutter_svg: 2.3.0
  json_annotation: 4.11.0
  shared_preferences: 2.5.5
  fluttertagger: 2.3.2
  dynamic_polls: 0.0.7
  flutter_hooks: 0.21.3+1
  cross_cache: 1.1.0
  ffi: 2.2.0
  hooks: 1.0.3
  code_assets: 1.0.0
  ffigen: 20.1.1
  timeago: 3.7.1
  http: 1.6.0
  flutter_linkify: 6.0.0
  linkify: 5.0.0
  emoji_text_field:
    git:
      url: https://github.com/Henry-Hiles/emoji_text_field
  flutter_blurhash: 0.9.1
  super_sliver_list: 0.4.1
  media_kit: 1.2.6
  media_kit_video: 2.0.1
  media_kit_libs_video: 1.0.7
  measure_size: ^5.0.2
  material_segmented_list: ^1.0.5
  m3e_buttons: ^0.0.3
  navigation_rail_m3e:
    git:
      url: https://github.com/Henry-Hiles/material_3_expressive
      path: packages/navigation_rail_m3e
  
dev_dependencies:
  build_runner: 2.15.0
  flutter_lints: 6.0.0
  freezed: 3.2.5
  riverpod_lint: 3.1.3
  flutter_launcher_icons: 0.14.4
  json_serializable: 6.13.0

flutter_launcher_icons:
  ios: true
  android: true
  image_path: assets/icon.png
  adaptive_icon_background: assets/background.png
  adaptive_icon_foreground: assets/foreground.png
  adaptive_icon_monochrome: assets/monochrome.png
  remove_alpha_ios: true
  windows:
    generate: true